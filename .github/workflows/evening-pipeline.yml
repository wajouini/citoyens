name: Evening Pipeline

on:
  workflow_dispatch:
  schedule:
    # Every day at 17:00 UTC (18:00 Paris winter, 19:00 Paris summer)
    - cron: '0 17 * * *'

env:
  NODE_VERSION: '20'

jobs:
  evening:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate evening edition
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'gemini' }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npx tsx scripts/generate-soir.ts

      - name: Build site
        run: npm run build

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update evening edition $(date +%Y-%m-%d)"
          git push
